<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 200" width="900" height="200">
  <defs>
    <!-- Backgrounds -->
    <linearGradient id="pageBg" x1="0" y1="0" x2="900" y2="200" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#080c10"/>
      <stop offset="1" stop-color="#0d1117"/>
    </linearGradient>
    <linearGradient id="termBg" x1="0" y1="0" x2="0" y2="156" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#13181f"/>
      <stop offset="1" stop-color="#0d1117"/>
    </linearGradient>
    <linearGradient id="titleBar" x1="0" y1="0" x2="840" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#1c2128"/>
      <stop offset="1" stop-color="#161b22"/>
    </linearGradient>

    <!-- Glows & accents -->
    <linearGradient id="borderGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#58a6ff" stop-opacity="0.7"/>
      <stop offset="0.4" stop-color="#a371f7" stop-opacity="0.5"/>
      <stop offset="1" stop-color="#58a6ff" stop-opacity="0.2"/>
    </linearGradient>
    <linearGradient id="nameGrad" x1="0" y1="0" x2="320" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#79c0ff"/>
      <stop offset="0.45" stop-color="#d2a8ff"/>
      <stop offset="1" stop-color="#79c0ff"/>
    </linearGradient>
    <linearGradient id="bottomAccent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#58a6ff" stop-opacity="0"/>
      <stop offset="0.25" stop-color="#58a6ff" stop-opacity="0.7"/>
      <stop offset="0.5" stop-color="#a371f7" stop-opacity="0.9"/>
      <stop offset="0.75" stop-color="#58a6ff" stop-opacity="0.7"/>
      <stop offset="1" stop-color="#58a6ff" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="scanline" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#58a6ff" stop-opacity="0"/>
      <stop offset="0.5" stop-color="#58a6ff" stop-opacity="0.04"/>
      <stop offset="1" stop-color="#58a6ff" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="orbLeft" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#58a6ff" stop-opacity="0.18"/>
      <stop offset="1" stop-color="#58a6ff" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="orbRight" x1="1" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#a371f7" stop-opacity="0.14"/>
      <stop offset="1" stop-color="#a371f7" stop-opacity="0"/>
    </linearGradient>

    <!-- Filters -->
    <filter id="blurLg" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="55"/>
    </filter>
    <filter id="blurMd" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="30"/>
    </filter>
    <filter id="termShadow" x="-5%" y="-10%" width="110%" height="130%">
      <feDropShadow dx="0" dy="6" stdDeviation="18" flood-color="#000" flood-opacity="0.6"/>
      <feDropShadow dx="0" dy="0" stdDeviation="8" flood-color="#58a6ff" flood-opacity="0.04"/>
    </filter>
    <filter id="textGlow" x="-20%" y="-50%" width="140%" height="200%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="promptGlow" x="-10%" y="-50%" width="120%" height="200%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Clip -->
    <clipPath id="termClip">
      <rect x="31" y="55" width="838" height="122" rx="0"/>
    </clipPath>
  </defs>

  <!-- Page background -->
  <rect width="900" height="200" fill="url(#pageBg)"/>

  <!-- Dot grid -->
  <pattern id="dots" x="0" y="0" width="20" height="20" patternUnits="userSpaceOnUse">
    <circle cx="10" cy="10" r="0.65" fill="#21262d" opacity="0.5"/>
  </pattern>
  <rect width="900" height="200" fill="url(#dots)"/>

  <!-- Ambient orbs -->
  <circle cx="820" cy="30" r="130" fill="url(#orbLeft)" filter="url(#blurLg)"/>
  <circle cx="700" cy="185" r="90" fill="url(#orbRight)" filter="url(#blurMd)"/>
  <circle cx="60" cy="170" r="55" fill="#3fb950" opacity="0.025" filter="url(#blurMd)"/>

  <!-- Terminal card -->
  <g filter="url(#termShadow)">
    <!-- Main body -->
    <rect x="30" y="22" width="840" height="156" rx="10" fill="url(#termBg)" stroke="url(#borderGrad)" stroke-width="1.2"/>

    <!-- Title bar -->
    <rect x="30" y="22" width="840" height="33" rx="10" fill="url(#titleBar)"/>
    <rect x="30" y="43" width="840" height="12" fill="url(#titleBar)"/>
    <rect x="30" y="54" width="840" height="1" fill="#21262d" opacity="0.8"/>

    <!-- Traffic lights -->
    <circle cx="55" cy="38.5" r="6" fill="#ff5f57"/>
    <circle cx="55" cy="38.5" r="3.5" fill="#ff5f57" opacity="0.3"/>
    <circle cx="75" cy="38.5" r="6" fill="#febc2e"/>
    <circle cx="75" cy="38.5" r="3.5" fill="#febc2e" opacity="0.3"/>
    <circle cx="95" cy="38.5" r="6" fill="#28c840"/>
    <circle cx="95" cy="38.5" r="3.5" fill="#28c840" opacity="0.3"/>

    <!-- Window title -->
    <text x="450" y="43" font-family="'SF Mono','JetBrains Mono','Fira Code',monospace" font-size="11.5" fill="#484f58" text-anchor="middle" letter-spacing="0.3">ThaiVietPhat — zsh — 148×40</text>

    <!-- Separator dots right side -->
    <circle cx="820" cy="38.5" r="2" fill="#30363d"/>
    <circle cx="833" cy="38.5" r="2" fill="#30363d"/>
    <circle cx="846" cy="38.5" r="2" fill="#30363d"/>
  </g>

  <!-- Terminal lines -->

  <!-- Line 1: whoami -->
  <text x="52" y="80" font-family="'SF Mono','JetBrains Mono','Fira Code',monospace" font-size="12.5" filter="url(#promptGlow)">
    <tspan fill="#3fb950">❯</tspan>
    <tspan fill="#c9d1d9"> whoami</tspan>
  </text>

  <!-- Line 2: whoami output — name prominent -->
  <text x="52" y="98" font-family="'SF Mono','JetBrains Mono','Fira Code',monospace" font-size="12.5">
    <tspan fill="#484f58">  </tspan>
    <tspan fill="url(#nameGrad)" font-weight="700" font-size="14.5" filter="url(#textGlow)">Thai Viet Phat</tspan>
    <tspan fill="#30363d" font-size="12.5">  │  </tspan>
    <tspan fill="#8b949e" font-size="12.5">Java Backend Developer</tspan>
    <tspan fill="#30363d" font-size="12.5">  │  </tspan>
    <tspan fill="#3fb950" font-size="12.5">Intern @ FPT Software</tspan>
  </text>

  <!-- Line 3: cat stack -->
  <text x="52" y="117" font-family="'SF Mono','JetBrains Mono','Fira Code',monospace" font-size="12.5" filter="url(#promptGlow)">
    <tspan fill="#3fb950">❯</tspan>
    <tspan fill="#c9d1d9"> cat </tspan>
    <tspan fill="#79c0ff">stack</tspan>
    <tspan fill="#c9d1d9">.txt</tspan>
  </text>

  <!-- Line 4: stack output with colored tokens -->
  <text x="52" y="135" font-family="'SF Mono','JetBrains Mono','Fira Code',monospace" font-size="12">
    <tspan fill="#484f58">  </tspan>
    <tspan fill="#79c0ff">Spring Boot</tspan>
    <tspan fill="#30363d">  ·  </tspan>
    <tspan fill="#d2a8ff">Spring Modulith</tspan>
    <tspan fill="#30363d">  ·  </tspan>
    <tspan fill="#79c0ff">Spring AI</tspan>
    <tspan fill="#30363d">  ·  </tspan>
    <tspan fill="#d2a8ff">pgvector</tspan>
    <tspan fill="#30363d">  ·  </tspan>
    <tspan fill="#79c0ff">Elasticsearch</tspan>
    <tspan fill="#30363d">  ·  </tspan>
    <tspan fill="#d2a8ff">Redis</tspan>
    <tspan fill="#30363d">  ·  </tspan>
    <tspan fill="#79c0ff">WebSocket</tspan>
  </text>

  <!-- Line 5: git log -->
  <text x="52" y="154" font-family="'SF Mono','JetBrains Mono','Fira Code',monospace" font-size="12.5" filter="url(#promptGlow)">
    <tspan fill="#3fb950">❯</tspan>
    <tspan fill="#c9d1d9"> git log </tspan>
    <tspan fill="#f0883e">--oneline</tspan>
    <tspan fill="#c9d1d9"> --all</tspan>
  </text>

  <!-- Line 6: git log output -->
  <text x="52" y="172" font-family="'SF Mono','JetBrains Mono','Fira Code',monospace" font-size="11.5">
    <tspan fill="#484f58">  </tspan>
    <tspan fill="#f0883e">a3f91c2</tspan>
    <tspan fill="#8b949e"> feat(shopee-clone): checkout · payment · semantic search · Thesis 2026</tspan>
  </text>

  <!-- Line 7: git log second entry + cursor -->
  <text x="52" y="187" font-family="'SF Mono','JetBrains Mono','Fira Code',monospace" font-size="11.5">
    <tspan fill="#484f58">  </tspan>
    <tspan fill="#f0883e">b7d02e1</tspan>
    <tspan fill="#8b949e"> feat(zalo-clone): realtime · WebRTC · Spring AI · full-stack deployed</tspan>
  </text>

  <!-- Blinking cursor on empty next prompt -->
  <text x="52" y="172" font-family="'SF Mono','JetBrains Mono','Fira Code',monospace" font-size="12.5" opacity="0">
    <tspan fill="#3fb950">❯ </tspan>
  </text>

  <!-- Scanline sweep animation -->
  <rect x="31" y="55" width="838" height="40" fill="url(#scanline)" clip-path="url(#termClip)" opacity="0.6">
    <animateTransform attributeName="transform" type="translate" from="0,-40" to="0,165" dur="4s" repeatCount="indefinite" calcMode="linear"/>
  </rect>

  <!-- Cursor blink -->
  <rect x="52" y="192" width="7.5" height="13" rx="1" fill="#58a6ff" opacity="0.9">
    <animate attributeName="opacity" values="0.9;0;0.9" dur="1.05s" repeatCount="indefinite" keyTimes="0;0.5;1"/>
  </rect>

  <!-- Bottom accent line -->
  <rect x="0" y="197.5" width="900" height="2" fill="url(#bottomAccent)"/>
</svg>
