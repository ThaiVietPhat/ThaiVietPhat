<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 200" width="900" height="200">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="900" y2="200" gradientUnits="userSpaceOnUse">
      <stop offset="0"   stop-color="#080c10"/>
      <stop offset="0.5" stop-color="#0d1117"/>
      <stop offset="1"   stop-color="#111827"/>
    </linearGradient>

    <!-- Name gradient: blue → purple → blue -->
    <linearGradient id="nameGrad" x1="0" y1="0" x2="560" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0"    stop-color="#79c0ff"/>
      <stop offset="0.42" stop-color="#d2a8ff"/>
      <stop offset="1"    stop-color="#79c0ff"/>
    </linearGradient>

    <!-- Accent bar gradient vertical -->
    <linearGradient id="barGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0"   stop-color="#58a6ff"/>
      <stop offset="0.5" stop-color="#a371f7"/>
      <stop offset="1"   stop-color="#58a6ff" stop-opacity="0.2"/>
    </linearGradient>

    <!-- Bottom line -->
    <linearGradient id="bottomLine" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0"    stop-color="#58a6ff" stop-opacity="0"/>
      <stop offset="0.2"  stop-color="#58a6ff" stop-opacity="0.8"/>
      <stop offset="0.5"  stop-color="#a371f7" stop-opacity="1"/>
      <stop offset="0.8"  stop-color="#58a6ff" stop-opacity="0.8"/>
      <stop offset="1"    stop-color="#58a6ff" stop-opacity="0"/>
    </linearGradient>

    <!-- Divider line -->
    <linearGradient id="divLine" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0"   stop-color="#30363d" stop-opacity="0"/>
      <stop offset="0.3" stop-color="#30363d" stop-opacity="1"/>
      <stop offset="0.7" stop-color="#30363d" stop-opacity="1"/>
      <stop offset="1"   stop-color="#30363d" stop-opacity="0"/>
    </linearGradient>

    <!-- Orb left -->
    <radialGradient id="orbL" cx="50%" cy="50%" r="50%">
      <stop offset="0" stop-color="#58a6ff" stop-opacity="0.18"/>
      <stop offset="1" stop-color="#58a6ff" stop-opacity="0"/>
    </radialGradient>

    <!-- Orb right -->
    <radialGradient id="orbR" cx="50%" cy="50%" r="50%">
      <stop offset="0" stop-color="#a371f7" stop-opacity="0.14"/>
      <stop offset="1" stop-color="#a371f7" stop-opacity="0"/>
    </radialGradient>

    <!-- Tag pill gradient -->
    <linearGradient id="pill1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#58a6ff" stop-opacity="0.15"/>
      <stop offset="1" stop-color="#58a6ff" stop-opacity="0.05"/>
    </linearGradient>
    <linearGradient id="pill2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#a371f7" stop-opacity="0.15"/>
      <stop offset="1" stop-color="#a371f7" stop-opacity="0.05"/>
    </linearGradient>
    <linearGradient id="pill3" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#3fb950" stop-opacity="0.15"/>
      <stop offset="1" stop-color="#3fb950" stop-opacity="0.05"/>
    </linearGradient>
  </defs>

  <!-- Base -->
  <rect width="900" height="200" fill="url(#bg)"/>

  <!-- Dot grid -->
  <pattern id="dots" x="0" y="0" width="22" height="22" patternUnits="userSpaceOnUse">
    <circle cx="11" cy="11" r="0.7" fill="#21262d" opacity="0.55"/>
  </pattern>
  <rect width="900" height="200" fill="url(#dots)"/>

  <!-- Ambient orbs -->
  <ellipse cx="780" cy="50"  rx="200" ry="120" fill="url(#orbL)" opacity="0.9"/>
  <ellipse cx="650" cy="170" rx="160" ry="90"  fill="url(#orbR)" opacity="0.9"/>
  <ellipse cx="60"  cy="160" rx="90"  ry="60"  fill="#3fb950" opacity="0.025"/>

  <!-- Left accent bar -->
  <rect x="38" y="32" width="4" height="136" rx="2" fill="url(#barGrad)"/>

  <!-- == LEFT BLOCK == -->

  <!-- Code bracket top -->
  <text x="54" y="52"
    font-family="'SF Mono','JetBrains Mono','Fira Code',monospace"
    font-size="11" fill="#58a6ff" opacity="0.45" letter-spacing="1.5">&lt;dev&gt;</text>

  <!-- NAME — biggest element -->
  <text x="54" y="108"
    font-family="'Segoe UI',system-ui,-apple-system,'Helvetica Neue',sans-serif"
    font-size="52" font-weight="900" fill="url(#nameGrad)"
    letter-spacing="-0.5">Thai Viet Phat</text>

  <!-- Role row -->
  <text x="56" y="132"
    font-family="'Segoe UI',system-ui,-apple-system,sans-serif"
    font-size="13.5" fill="#8b949e" letter-spacing="2.8" font-weight="500">JAVA BACKEND DEVELOPER</text>

  <!-- Code bracket bottom -->
  <text x="54" y="160"
    font-family="'SF Mono','JetBrains Mono','Fira Code',monospace"
    font-size="11" fill="#58a6ff" opacity="0.45" letter-spacing="1.5">&lt;/dev&gt;</text>

  <!-- Vertical divider -->
  <rect x="510" y="28" width="1" height="144" fill="url(#divLine)"/>

  <!-- == RIGHT BLOCK == -->

  <!-- Status pill -->
  <rect x="530" y="30" width="148" height="24" rx="12"
    fill="url(#pill3)" stroke="#3fb950" stroke-width="0.8" stroke-opacity="0.4"/>
  <circle cx="546" cy="42" r="4" fill="#3fb950"/>
  <text x="556" y="46.5"
    font-family="'Segoe UI',system-ui,sans-serif"
    font-size="11.5" fill="#3fb950" font-weight="600" letter-spacing="0.3">Intern @ FPT Software</text>

  <!-- Education line -->
  <text x="530" y="82"
    font-family="'Segoe UI',system-ui,sans-serif"
    font-size="12" fill="#484f58">🎓</text>
  <text x="552" y="82"
    font-family="'Segoe UI',system-ui,sans-serif"
    font-size="12" fill="#8b949e">
    <tspan fill="#c9d1d9">IUH</tspan>
    <tspan fill="#484f58"> · Computer Science · </tspan>
    <tspan fill="#58a6ff">2022 – 2026</tspan>
  </text>

  <!-- Location line -->
  <text x="530" y="102"
    font-family="'Segoe UI',system-ui,sans-serif"
    font-size="12" fill="#484f58">📍</text>
  <text x="552" y="102"
    font-family="'Segoe UI',system-ui,sans-serif"
    font-size="12">
    <tspan fill="#c9d1d9">Ho Chi Minh City</tspan>
    <tspan fill="#484f58">, Vietnam</tspan>
  </text>

  <!-- Thin separator -->
  <rect x="530" y="114" width="340" height="1" fill="#21262d" opacity="0.8"/>

  <!-- Stack tags row 1 -->
  <!-- Spring Boot -->
  <rect x="530" y="122" width="93" height="20" rx="10"
    fill="url(#pill1)" stroke="#58a6ff" stroke-width="0.7" stroke-opacity="0.3"/>
  <text x="576.5" y="136"
    font-family="'SF Mono','JetBrains Mono',monospace"
    font-size="10.5" fill="#79c0ff" text-anchor="middle" font-weight="500">Spring Boot</text>

  <!-- Spring AI -->
  <rect x="630" y="122" width="78" height="20" rx="10"
    fill="url(#pill2)" stroke="#a371f7" stroke-width="0.7" stroke-opacity="0.3"/>
  <text x="669" y="136"
    font-family="'SF Mono','JetBrains Mono',monospace"
    font-size="10.5" fill="#d2a8ff" text-anchor="middle" font-weight="500">Spring AI</text>

  <!-- PostgreSQL -->
  <rect x="715" y="122" width="90" height="20" rx="10"
    fill="url(#pill1)" stroke="#58a6ff" stroke-width="0.7" stroke-opacity="0.3"/>
  <text x="760" y="136"
    font-family="'SF Mono','JetBrains Mono',monospace"
    font-size="10.5" fill="#79c0ff" text-anchor="middle" font-weight="500">PostgreSQL</text>

  <!-- Stack tags row 2 -->
  <!-- Elasticsearch -->
  <rect x="530" y="148" width="100" height="20" rx="10"
    fill="url(#pill2)" stroke="#a371f7" stroke-width="0.7" stroke-opacity="0.3"/>
  <text x="580" y="162"
    font-family="'SF Mono','JetBrains Mono',monospace"
    font-size="10.5" fill="#d2a8ff" text-anchor="middle" font-weight="500">Elasticsearch</text>

  <!-- WebSocket -->
  <rect x="637" y="148" width="82" height="20" rx="10"
    fill="url(#pill1)" stroke="#58a6ff" stroke-width="0.7" stroke-opacity="0.3"/>
  <text x="678" y="162"
    font-family="'SF Mono','JetBrains Mono',monospace"
    font-size="10.5" fill="#79c0ff" text-anchor="middle" font-weight="500">WebSocket</text>

  <!-- pgvector -->
  <rect x="726" y="148" width="74" height="20" rx="10"
    fill="url(#pill2)" stroke="#a371f7" stroke-width="0.7" stroke-opacity="0.3"/>
  <text x="763" y="162"
    font-family="'SF Mono','JetBrains Mono',monospace"
    font-size="10.5" fill="#d2a8ff" text-anchor="middle" font-weight="500">pgvector</text>

  <!-- Quote / tagline bottom right -->
  <text x="530" y="186"
    font-family="'SF Mono','JetBrains Mono','Fira Code',monospace"
    font-size="11" fill="#484f58" letter-spacing="0.3">// turning ☕ into production-ready Java APIs</text>

  <!-- Bottom accent line -->
  <rect x="0" y="197" width="900" height="2.5" fill="url(#bottomLine)"/>
</svg>
