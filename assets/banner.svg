<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 200" width="900" height="200">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="900" y2="200" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0d1117"/>
      <stop offset="0.6" stop-color="#0d1117"/>
      <stop offset="1" stop-color="#111827"/>
    </linearGradient>
    <linearGradient id="terminalBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#161b22"/>
      <stop offset="1" stop-color="#0d1117"/>
    </linearGradient>
    <linearGradient id="accentLine" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#58a6ff" stop-opacity="0"/>
      <stop offset="0.3" stop-color="#58a6ff" stop-opacity="0.6"/>
      <stop offset="0.7" stop-color="#a371f7" stop-opacity="0.6"/>
      <stop offset="1" stop-color="#a371f7" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="nameGrad" x1="0" y1="0" x2="300" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#58a6ff"/>
      <stop offset="0.5" stop-color="#a371f7"/>
      <stop offset="1" stop-color="#58a6ff"/>
    </linearGradient>
    <linearGradient id="orb1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#58a6ff" stop-opacity="0.12"/>
      <stop offset="1" stop-color="#58a6ff" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="orb2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#a371f7" stop-opacity="0.08"/>
      <stop offset="1" stop-color="#a371f7" stop-opacity="0"/>
    </linearGradient>
    <filter id="blurLg">
      <feGaussianBlur stdDeviation="55"/>
    </filter>
    <filter id="blurMd">
      <feGaussianBlur stdDeviation="35"/>
    </filter>
    <filter id="termShadow">
      <feDropShadow dx="0" dy="8" stdDeviation="20" flood-color="#000" flood-opacity="0.5"/>
    </filter>
    <filter id="glowBlue">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>

  <!-- Base background -->
  <rect width="900" height="200" fill="url(#bg)"/>

  <!-- Dot grid -->
  <pattern id="dots" x="0" y="0" width="22" height="22" patternUnits="userSpaceOnUse">
    <circle cx="11" cy="11" r="0.7" fill="#21262d" opacity="0.6"/>
  </pattern>
  <rect width="900" height="200" fill="url(#dots)"/>

  <!-- Ambient orbs -->
  <circle cx="820" cy="40" r="120" fill="url(#orb1)" filter="url(#blurLg)"/>
  <circle cx="680" cy="180" r="80" fill="url(#orb2)" filter="url(#blurMd)"/>
  <circle cx="80" cy="160" r="60" fill="#58a6ff" opacity="0.03" filter="url(#blurMd)"/>

  <!-- Terminal window -->
  <g filter="url(#termShadow)">
    <!-- Terminal body -->
    <rect x="30" y="22" width="840" height="156" rx="10" fill="url(#terminalBg)" stroke="#30363d" stroke-width="1"/>

    <!-- Title bar -->
    <rect x="30" y="22" width="840" height="32" rx="10" fill="#161b22"/>
    <rect x="30" y="38" width="840" height="16" fill="#161b22"/>
    <rect x="30" y="43" width="840" height="1" fill="#21262d"/>

    <!-- Traffic lights -->
    <circle cx="54" cy="38" r="6" fill="#ff5f57"/>
    <circle cx="74" cy="38" r="6" fill="#febc2e"/>
    <circle cx="94" cy="38" r="6" fill="#28c840"/>

    <!-- Terminal title -->
    <text x="450" y="43" font-family="'SF Mono', 'JetBrains Mono', monospace" font-size="12" fill="#484f58" text-anchor="middle">ThaiVietPhat — zsh</text>
  </g>

  <!-- Terminal content -->
  <!-- Line 1: prompt + whoami -->
  <text x="54" y="82" font-family="'SF Mono', 'JetBrains Mono', 'Fira Code', monospace" font-size="13">
    <tspan fill="#3fb950">thaivietphat</tspan>
    <tspan fill="#8b949e">@</tspan>
    <tspan fill="#58a6ff">macbook</tspan>
    <tspan fill="#8b949e"> ~ </tspan>
    <tspan fill="#f0883e">$</tspan>
    <tspan fill="#c9d1d9"> whoami</tspan>
  </text>

  <!-- Line 2: output name -->
  <text x="54" y="102" font-family="'SF Mono', 'JetBrains Mono', 'Fira Code', monospace" font-size="13">
    <tspan fill="#8b949e">→  </tspan>
    <tspan fill="url(#nameGrad)" font-weight="700" font-size="15">Thai Viet Phat</tspan>
    <tspan fill="#484f58" font-size="13">  ·  </tspan>
    <tspan fill="#8b949e" font-size="13">Java Backend Developer</tspan>
    <tspan fill="#484f58" font-size="13">  ·  </tspan>
    <tspan fill="#3fb950" font-size="13">Intern @ FPT Software</tspan>
  </text>

  <!-- Line 3: prompt + cat -->
  <text x="54" y="124" font-family="'SF Mono', 'JetBrains Mono', 'Fira Code', monospace" font-size="13">
    <tspan fill="#3fb950">thaivietphat</tspan>
    <tspan fill="#8b949e">@</tspan>
    <tspan fill="#58a6ff">macbook</tspan>
    <tspan fill="#8b949e"> ~ </tspan>
    <tspan fill="#f0883e">$</tspan>
    <tspan fill="#c9d1d9"> cat stack.txt</tspan>
  </text>

  <!-- Line 4: stack output -->
  <text x="54" y="144" font-family="'SF Mono', 'JetBrains Mono', 'Fira Code', monospace" font-size="12">
    <tspan fill="#8b949e">→  </tspan>
    <tspan fill="#58a6ff">Spring Boot</tspan>
    <tspan fill="#484f58">  ·  </tspan>
    <tspan fill="#a371f7">Spring Modulith</tspan>
    <tspan fill="#484f58">  ·  </tspan>
    <tspan fill="#58a6ff">Spring AI</tspan>
    <tspan fill="#484f58">  ·  </tspan>
    <tspan fill="#a371f7">pgvector</tspan>
    <tspan fill="#484f58">  ·  </tspan>
    <tspan fill="#58a6ff">Elasticsearch</tspan>
    <tspan fill="#484f58">  ·  </tspan>
    <tspan fill="#a371f7">WebSocket</tspan>
  </text>

  <!-- Line 5: next prompt + cursor -->
  <text x="54" y="165" font-family="'SF Mono', 'JetBrains Mono', 'Fira Code', monospace" font-size="13">
    <tspan fill="#3fb950">thaivietphat</tspan>
    <tspan fill="#8b949e">@</tspan>
    <tspan fill="#58a6ff">macbook</tspan>
    <tspan fill="#8b949e"> ~ </tspan>
    <tspan fill="#f0883e">$</tspan>
    <tspan fill="#c9d1d9"> </tspan>
  </text>
  <!-- Blinking cursor block -->
  <rect x="212" y="153" width="8" height="14" fill="#58a6ff" opacity="0.85">
    <animate attributeName="opacity" values="0.85;0;0.85" dur="1.1s" repeatCount="indefinite"/>
  </rect>

  <!-- Bottom accent line -->
  <rect x="0" y="197" width="900" height="1.5" fill="url(#accentLine)"/>
</svg>
